version: v1.0
name: "\U0001F40D Python CI Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2004
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
      - mkdir -p .pip_cache
      - cache restore pip-$SEMAPHORE_GIT_BRANCH-$(checksum requirements.txt)
      - pip install --cache-dir .pip_cache -r requirements.txt
blocks:
  - name: Setup and Cache
    dependencies: []
    task:
      jobs:
        - name: Install Dependencies
          commands:
            - cache store pip-$SEMAPHORE_GIT_BRANCH-$(checksum requirements.txt) .pip_cache
  - name: Code Quality
    dependencies:
      - Setup and Cache
    task:
      jobs:
        - name: Lint and Format
          commands:
            - make lint
  - name: Test Suite
    dependencies:
      - Setup and Cache
    task:
      jobs:
        - name: Pytest
          commands:
            - make test
